<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Угадай песню</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --c-bg: #110f1f; --c-text-h: #fff; --c-text: #eeecf5; --c-text2: #e0ddf0;
    --c-muted: #8a84a8; --c-muted2: #a49ec0; --c-muted3: #6a6588; --c-muted4: #b0a8cc;
    --c-dim: #c8c5d8; --c-surface: #1e1b2e; --c-surface2: #1a1730; --c-surface3: #222040;
    --c-el: #2a2740; --c-border: #302d45; --c-border2: #2d2a42;
  }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--c-bg); color: var(--c-text); min-height: 100vh; overflow-x: hidden; }
  .container { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

  /* Splash */
  #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #110f1f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
  #splash.hide { opacity: 0; pointer-events: none; }
  .splash-icon { width: 90px; height: 90px; border-radius: 22px; background: linear-gradient(135deg, #f59e0b, #ea580c); display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 40px rgba(245,158,11,0.4); animation: splashPulse 1.2s ease-in-out infinite; }
  @keyframes splashPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  .splash-title { font-size: 28px; font-weight: 900; color: #fff; margin-top: 20px; }
  .splash-sub { color: #6b6490; font-size: 14px; margin-top: 6px; }
  .splash-dots { display: flex; gap: 8px; margin-top: 32px; }
  .splash-dots span { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; animation: dotBounce 1.2s ease-in-out infinite; }
  .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
  .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotBounce { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }

  /* Bottom nav */
  .bottom-nav { display: flex; justify-content: center; gap: 6px; margin-bottom: 24px; }
  .nav-btn { background: #1e1b2e; border: 1px solid var(--c-border); border-radius: 12px; padding: 10px 20px; color: #6b6490; font-weight: 800; font-size: 13px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .nav-btn.active { background: linear-gradient(135deg, #f59e0b, #ea580c); color: #000; border-color: transparent; box-shadow: 0 4px 16px rgba(245,158,11,0.25); }

  /* Buttons */
  .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: 900; font-size: 15px; cursor: pointer; text-align: center; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,0.35); }
  .btn-primary:disabled { background: #1e1b30; color: #7a75a0; box-shadow: none; border: 1px solid #3a3755; cursor: default; }
  .btn-orange { background: linear-gradient(135deg, #f59e0b, #ea580c); color: #000; box-shadow: 0 4px 16px rgba(245,158,11,0.35); }
  .btn-orange:disabled { background: #1e1b30; color: #7a75a0; box-shadow: none; border: 1px solid #3a3755; cursor: default; }

  /* Cards */
  .card { background: #1e1b2e; border: 1px solid var(--c-border); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
  .panel { background: #1a1730; border: 1px solid var(--c-border2); border-radius: 16px; padding: 18px; margin-bottom: 20px; }

  /* Inputs */
  input[type="text"] { width: 100%; background: #151225; border: 1px solid #3b3558; border-radius: 10px; padding: 12px 14px; color: #e2e0ea; font-size: 14px; outline: none; transition: border 0.2s; }
  input[type="text"]:focus { border-color: #f59e0b80; }
  input[type="text"]::placeholder { color: #8580a0; }

  /* Label */
  .lbl { color: #8b85a8; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; }

  /* Avatar */
  .ava { width: 30px; height: 30px; border-radius: 8px; background: #2a2740; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: #a5a0c0; flex-shrink: 0; }
  .ava-sm { width: 28px; height: 28px; border-radius: 7px; font-size: 12px; }

  /* Search results */
  .sr { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 10px; cursor: pointer; transition: background 0.15s; }
  .sr:hover, .sr:active { background: #2a2740; }
  .sr img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #222040; flex-shrink: 0; }
  .sr-title { color: #d4d0e8; font-size: 13px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sr-sub { color: #6b6490; font-size: 11px; margin-top: 2px; }

  /* Audio player */
  .player { background: #1a1730; border: 1px solid var(--c-border); border-radius: 16px; padding: 16px; }
  .player.compact { border-radius: 12px; padding: 12px; }
  .play-btn { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .play-btn.compact { width: 36px; height: 36px; }
  .play-btn.playing { background: #f59e0b; box-shadow: 0 2px 16px rgba(245,158,11,0.35); }
  .play-btn:not(.playing) { background: #2a2740; }
  .progress-bar { flex: 1; height: 6px; background: #2a2740; border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
  .progress-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; background: linear-gradient(90deg, #f59e0b, #ea580c); transition: width 0.15s; }

  /* Guess buttons */
  .guess-btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 800; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .guess-btn.active { background: #2a2740; color: #c8c4dc; }
  .guess-btn.active:hover { background: #353050; }
  .guess-btn.selected { background: #f59e0b; color: #000; box-shadow: 0 2px 12px rgba(245,158,11,0.35); cursor: default; }
  .guess-btn.disabled { background: #18162a; color: #302d45; cursor: default; }

  /* Results */
  .result-correct { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); border-radius: 10px; padding: 9px 14px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .result-wrong { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 9px 14px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }

  /* Progress top bar */
  .top-progress { width: 100%; height: 4px; background: #1e1b2e; border-radius: 4px; margin-bottom: 24px; overflow: hidden; }
  .top-progress-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #ea580c); border-radius: 4px; transition: width 0.5s; }

  /* History */
  .history-card { background: #1e1b2e; border: 1px solid var(--c-border); border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
  .history-card:hover { border-color: #f59e0b50; }
  .history-date { color: #6b6490; font-size: 11px; font-weight: 700; }
  .history-winner { color: #f59e0b; font-weight: 800; font-size: 14px; margin-top: 4px; }
  .history-players { color: #8b85a8; font-size: 12px; margin-top: 4px; }
  .history-empty { text-align: center; padding: 60px 20px; }
  .history-detail { background: #151225; border: 1px solid var(--c-border2); border-radius: 10px; padding: 10px 14px; margin-top: 4px; font-size: 12px; }

  /* Settings */
  .setting-row { display: flex; justify-content: space-between; align-items: center; background: #1e1b2e; border: 1px solid var(--c-border); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
  .setting-label { font-weight: 700; font-size: 14px; color: #d4d0e8; }
  .setting-desc { font-size: 12px; color: #6b6490; margin-top: 2px; }
  .stepper { display: flex; align-items: center; gap: 12px; }
  .stepper button { width: 36px; height: 36px; border-radius: 10px; border: 1px solid #3b3558; background: #1a1730; color: #f59e0b; font-size: 18px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .stepper button:active { background: #2a2740; }
  .stepper span { font-weight: 900; font-size: 18px; color: #fff; min-width: 24px; text-align: center; }

  /* Animations */
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .loading { animation: pulse 1s infinite; color: #f59e0b; font-size: 12px; margin-top: 8px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease-out; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3b3558; border-radius: 2px; }

  .dur-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--c-border); background: var(--c-surface); color: var(--c-muted2); font-weight: 800; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .dur-btn.dur-active { background: #f59e0b; color: #000; border-color: #f59e0b; }
  .hidden { display: none !important; }

  /* Toggle switch */
  .toggle { position: relative; width: 52px; height: 30px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #2a2740; border-radius: 15px; transition: 0.3s; }
  .toggle-track:before { content: ''; position: absolute; height: 24px; width: 24px; left: 3px; bottom: 3px; background: #6b6490; border-radius: 50%; transition: 0.3s; }
  .toggle input:checked + .toggle-track { background: #f59e0b; }
  .toggle input:checked + .toggle-track:before { transform: translateX(22px); background: #fff; }

  /* ═══════ LIGHT THEME ═══════ */
  body.light {
    --c-bg: #f4f3f8; --c-text-h: #1a1730; --c-text: #1a1730; --c-text2: #2a2740;
    --c-muted: #5a5470; --c-muted2: #5a5470; --c-muted3: #6b6580; --c-muted4: #5a5470;
    --c-dim: #5a5780; --c-surface: #fff; --c-surface2: #fff; --c-surface3: #f0eff5;
    --c-el: #e8e7ef; --c-border: #d0cfd8; --c-border2: #d0cfd8;
  }
  .light #splash { background: #f4f3f8; }
  .light .splash-title { color: #1a1730; }
  .light .nav-btn { background: #fff; border-color: var(--c-border); color: var(--c-muted); }
  .light .nav-btn.active { background: linear-gradient(135deg, #f59e0b, #ea580c); color: #fff; border-color: transparent; }
  .light .btn-primary:disabled { background: #d8d7e2; color: #999; border-color: #cccbd5; box-shadow: none; }
  .light .btn-orange:disabled { background: #d8d7e2; color: #999; border-color: #cccbd5; box-shadow: none; }
  .light .card { background: #fff; border-color: var(--c-border); }
  .light .panel { background: #fff; border-color: var(--c-border); }
  .light input[type="text"] { background: #fff; border-color: #c8c7d2; color: #1a1730; }
  .light input[type="text"]::placeholder { color: #8b85a0; }
  .light .lbl { color: #5a5470; }
  .light .ava { background: #e8e7ef; color: #4a4568; }
  .light .sr:hover, .light .sr:active { background: #f0eff5; }
  .light .sr-title { color: #1a1730; }
  .light .sr-sub { color: #5a5470; }
  .light .player { background: #fff; border-color: var(--c-border); }
  .light .play-btn:not(.playing) { background: linear-gradient(135deg, #f59e0b, #ea580c); }
  .light .progress-bar { background: #e8e7ef; }
  .light .guess-btn.active { background: #e8e7ef; color: #1a1730; }
  .light .guess-btn.active:hover { background: #dddce5; }
  .light .guess-btn.disabled { background: #f0eff5; color: #a8a4bc; }
  .light .top-progress { background: #e8e7ef; }
  .light .result-correct { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.2); }
  .light .result-wrong { background: rgba(239,68,68,0.06); border-color: rgba(239,68,68,0.15); }
  .light .history-card { background: #fff; border-color: var(--c-border); }
  .light .history-detail { background: #f4f3f8; border-color: var(--c-border); color: #2a2740; }
  .light .setting-row { background: #fff; border-color: var(--c-border); }
  .light .setting-label { color: #1a1730; }
  .light .setting-desc { color: #5a5470; }
  .light .stepper button { background: #f4f3f8; border-color: var(--c-border); }
  .light .stepper span { color: #1a1730; }
  .light .toggle-track { background: #e0dfe8; }
  .light .toggle-track:before { background: #b0adc4; }
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <div class="splash-icon">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  </div>
  <div class="splash-title">Угадай песню</div>
  <div class="splash-sub">Музыкальная игра для компании</div>
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<div class="container" id="app"></div>

<script>
// ═══════ SPLASH ═══════
setTimeout(() => {
  const splash = document.getElementById('splash');
  splash.classList.add('hide');
  setTimeout(() => splash.style.display = 'none', 500);
}, 1500);

const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];

// ═══════ SETTINGS (localStorage) ═══════
const defaultSettings = { songsPerPlayer: 3, theme: 'dark', previewDuration: 30, playbackSpeed: 1, guessSongName: true };
function loadSettings() {
  try { return { ...defaultSettings, ...JSON.parse(localStorage.getItem('gts_settings')) }; } catch { return { ...defaultSettings }; }
}
function saveSettings(s) { localStorage.setItem('gts_settings', JSON.stringify(s)); }
function applyTheme(theme) {
  if (theme === 'light') document.body.classList.add('light');
  else document.body.classList.remove('light');
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = theme === 'light' ? '#f4f3f8' : '#f59e0b';
}

// ═══════ HISTORY (localStorage) ═══════
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('gts_history')) || []; } catch { return []; }
}
function saveHistory(h) { localStorage.setItem('gts_history', JSON.stringify(h)); }
function addGameToHistory(gameData) {
  const h = loadHistory();
  h.unshift(gameData);
  if (h.length > 50) h.length = 50;
  saveHistory(h);
}

// ═══════ STATE ═══════
let settings = loadSettings();
applyTheme(settings.theme);

let state = {
  phase: "setup",
  tab: "game", // "game" | "history" | "settings"
  players: {},
  currentName: "",
  slots: [],
  shuffled: [],
  idx: 0,
  guesses: {},
  roundPhase: "passing", // "passing" | "voting" | "confirmed" (для режима с угадыванием песни)
  currentVoterIdx: 0,
};

function initSlots() {
  state.slots = Array(settings.songsPerPlayer).fill(null);
}
initSlots();

function getNames() { return Object.keys(state.players); }
function getTotal() { return Object.values(state.players).flat().length; }

// ═══════ DEEZER SEARCH ═══════
async function deezerSearch(query) {
  try {
    const r = await fetch(`https://api.deezer.com/search?q=${encodeURIComponent(query)}&limit=8&output=jsonp&callback=?`);
    const d = await r.json();
    if (d.data?.length) return d.data.filter(t => t.preview).map(t => ({
      id: t.id, title: t.title_short || t.title, artist: t.artist?.name || "", artistId: t.artist?.id || null,
      album: t.album?.title || "", cover: t.album?.cover_medium || "", preview: t.preview,
    }));
  } catch {}
  try {
    return await new Promise((resolve, reject) => {
      const cb = '_dz_' + Math.random().toString(36).slice(2);
      window[cb] = (d) => { delete window[cb]; s.remove(); resolve(d.data?.filter(t => t.preview).map(t => ({ id: t.id, title: t.title_short || t.title, artist: t.artist?.name || "", artistId: t.artist?.id || null, album: t.album?.title || "", cover: t.album?.cover_medium || "", preview: t.preview })) || []); };
      const s = document.createElement('script');
      s.src = `https://api.deezer.com/search?q=${encodeURIComponent(query)}&limit=8&output=jsonp&callback=${cb}`;
      s.onerror = () => { delete window[cb]; reject(); };
      document.head.appendChild(s);
      setTimeout(() => { if (window[cb]) { delete window[cb]; s.remove(); reject(); } }, 8000);
    });
  } catch {}
  return null;
}

// ═══════ DEEZER JSONP (общий) ═══════
function dzJsonp(path) {
  return new Promise((resolve) => {
    const cb = '_dz_' + Math.random().toString(36).slice(2);
    let done = false;
    const s = document.createElement('script');
    window[cb] = (d) => { if (done) return; done = true; delete window[cb]; s.remove(); resolve(d); };
    const sep = path.includes('?') ? '&' : '?';
    s.src = `https://api.deezer.com${path}${sep}output=jsonp&callback=${cb}`;
    s.onerror = () => { if (done) return; done = true; delete window[cb]; resolve(null); };
    document.head.appendChild(s);
    setTimeout(() => { if (!done) { done = true; try { delete window[cb]; } catch {} s.remove(); resolve(null); } }, 8000);
  });
}

// ═══════ ГЕНЕРАЦИЯ ВАРИАНТОВ ДЛЯ УГАДЫВАНИЯ ПЕСНИ ═══════
// Возвращает массив из 6 объектов {title, artist}: 3 от той же группы (включая правильный) + 3 от других групп.
// Если связанных артистов нет — все 6 из той же группы. Если и этого не хватает — меньше 6.
async function enrichSongOptions(song) {
  const correct = { title: song.title, artist: song.artist };
  song.correctOption = correct;

  const norm = (x) => (x || '').toLowerCase().trim();
  const key = (o) => norm(o.artist) + '||' + norm(o.title);
  const shuffle = (a) => { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

  const seen = new Set([key(correct)]);
  const sameArtistPool = [];
  const otherPool = [];
  const addTo = (pool, title, artist) => {
    if (!title || !artist) return;
    const o = { title, artist };
    const k = key(o);
    if (seen.has(k)) return;
    seen.add(k);
    pool.push(o);
  };

  // 1) Топ-треки того же артиста
  if (song.artistId) {
    const top = await dzJsonp(`/artist/${song.artistId}/top?limit=50`);
    if (top?.data) {
      for (const t of top.data) addTo(sameArtistPool, t.title_short || t.title, song.artist);
    }
  }
  shuffle(sameArtistPool);

  // 2) Связанные артисты → их топ-треки
  if (song.artistId) {
    const rel = await dzJsonp(`/artist/${song.artistId}/related?limit=10`);
    if (rel?.data?.length) {
      const relArtists = shuffle([...rel.data]).slice(0, 6);
      for (const ra of relArtists) {
        if (otherPool.length >= 6) break;
        const raTop = await dzJsonp(`/artist/${ra.id}/top?limit=5`);
        if (raTop?.data?.length) {
          const tracks = shuffle([...raTop.data]);
          for (const t of tracks) {
            addTo(otherPool, t.title_short || t.title, ra.name);
            break;
          }
        }
      }
    }
  }

  // 3) Если вариантов мало — добираем из чарта Deezer (популярные треки)
  const need = () => (sameArtistPool.length + otherPool.length) < 5;
  if (need()) {
    const chart = await dzJsonp('/chart/0/tracks?limit=50');
    if (chart?.data?.length) {
      const tracks = shuffle([...chart.data]);
      for (const t of tracks) {
        if (!need()) break;
        addTo(otherPool, t.title_short || t.title, t.artist?.name || '');
      }
    }
  }

  // 4) Поиск по словам названия песни — ищем треки с похожим словом в названии
  if (need() && song.title) {
    const words = (song.title || '').split(/\s+/).filter(w => w.length >= 3);
    for (const w of words) {
      if (!need()) break;
      const res = await dzJsonp(`/search?q=${encodeURIComponent(w)}&limit=25`);
      if (res?.data?.length) {
        const tracks = shuffle([...res.data]);
        for (const t of tracks) {
          if (!need()) break;
          const tArtist = t.artist?.name || '';
          const tTitle = t.title_short || t.title;
          if (norm(tArtist) === norm(song.artist)) {
            addTo(sameArtistPool, tTitle, tArtist);
          } else {
            addTo(otherPool, tTitle, tArtist);
          }
        }
      }
    }
  }

  // 5) Финальный фолбэк — поиск по имени артиста
  if (need() && song.artist) {
    const s = await dzJsonp(`/search?q=${encodeURIComponent(song.artist)}&limit=30`);
    if (s?.data?.length) {
      const tracks = shuffle([...s.data]);
      for (const t of tracks) {
        if (!need()) break;
        const tArtist = t.artist?.name || '';
        if (norm(tArtist) === norm(song.artist)) {
          addTo(sameArtistPool, t.title_short || t.title, tArtist);
        } else {
          addTo(otherPool, t.title_short || t.title, tArtist);
        }
      }
    }
  }

  // Сборка финального списка.
  // Рандомизируем размер кластера того же артиста: 1, 2 или 3 (включая правильный),
  // чтобы правильный ответ не всегда был в группе из трёх одинаковых.
  const correctClusterSize = Math.floor(Math.random() * 3) + 1;
  const sameShuffled = shuffle([...sameArtistPool]);
  const otherShuffled = shuffle([...otherPool]);

  const result = [correct];
  // Догоняем кластер правильного артиста до выбранного размера
  let sameIdx = 0;
  while (result.length < correctClusterSize && sameIdx < sameShuffled.length) {
    result.push(sameShuffled[sameIdx++]);
  }
  // Заполняем до 6 треками от других артистов (они тоже могут случайно повторяться)
  let otherIdx = 0;
  while (result.length < 6 && otherIdx < otherShuffled.length) {
    result.push(otherShuffled[otherIdx++]);
  }
  // Если других не хватило — добираем ещё из того же артиста
  while (result.length < 6 && sameIdx < sameShuffled.length) {
    result.push(sameShuffled[sameIdx++]);
  }

  shuffle(result);
  song.options = result;
}

// ═══════ AUDIO MANAGER ═══════
let currentAudio = null;
let persistentPlayer = null;
let persistentPlayerRoundIdx = -1;

function stopAudio(opts = {}) {
  if (!currentAudio) return;
  if (opts.preservePersistent && persistentPlayer && currentAudio === persistentPlayer._audio) return;
  currentAudio.pause();
  currentAudio.currentTime = 0;
}

function cleanupPersistentPlayer() {
  if (persistentPlayer) {
    const a = persistentPlayer._audio;
    if (a) { try { a.pause(); a.src = ''; } catch {} }
    if (persistentPlayer.parentNode) persistentPlayer.parentNode.removeChild(persistentPlayer);
    persistentPlayer = null;
    persistentPlayerRoundIdx = -1;
  }
}

function createPlayer(src, opts = {}) {
  const { compact, hideTitle, title, artist, maxDuration, speed } = opts;
  const div = document.createElement('div');
  div.className = `player${compact ? ' compact' : ''}`;

  const audio = new Audio(src);
  audio.preload = 'auto';
  if (speed) {
    audio.playbackRate = speed;
    audio.addEventListener('loadeddata', () => { audio.playbackRate = speed; });
    audio.addEventListener('canplay', () => { audio.playbackRate = speed; });
  }
  let playing = false;

  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:' + (compact ? '10' : '14') + 'px';

  const playBtn = document.createElement('button');
  playBtn.className = `play-btn${compact ? ' compact' : ''}`;
  playBtn.innerHTML = playSvg(compact ? 16 : 20);

  const right = document.createElement('div');
  right.style.cssText = 'flex:1;min-width:0';

  if (!hideTitle && title) {
    const titleEl = document.createElement('p');
    titleEl.style.cssText = `color:var(--c-text);font-size:${compact ? 12 : 14}px;font-weight:700;margin:0 0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap`;
    titleEl.textContent = artist ? `${artist} — ${title}` : title;
    right.appendChild(titleEl);
  }

  const progRow = document.createElement('div');
  progRow.style.cssText = 'display:flex;align-items:center;gap:8px';

  const bar = document.createElement('div');
  bar.className = 'progress-bar';
  const fill = document.createElement('div');
  fill.className = 'progress-fill';
  fill.style.width = '0%';
  bar.appendChild(fill);

  const timeEl = document.createElement('span');
  timeEl.style.cssText = 'color:var(--c-muted);font-size:11px;font-weight:700;flex-shrink:0;min-width:70px;text-align:right';
  timeEl.textContent = '0:00 / 0:00';

  progRow.append(bar, timeEl);
  right.appendChild(progRow);
  row.append(playBtn, right);
  div.appendChild(row);

  const fmt = (s) => isNaN(s) || !s ? '0:00' : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

  const effectiveDuration = () => maxDuration && audio.duration ? Math.min(maxDuration, audio.duration) : audio.duration;
  audio.addEventListener('timeupdate', () => {
    const dur = effectiveDuration();
    if (maxDuration && audio.currentTime >= maxDuration) { audio.pause(); audio.currentTime = 0; return; }
    fill.style.width = dur ? `${(audio.currentTime/dur)*100}%` : '0%';
    timeEl.textContent = `${fmt(audio.currentTime)} / ${fmt(dur)}`;
  });
  audio.addEventListener('ended', () => { playing = false; playBtn.classList.remove('playing'); playBtn.innerHTML = playSvg(compact ? 16 : 20); fill.style.width = '0%'; });
  audio.addEventListener('play', () => { playing = true; playBtn.classList.add('playing'); playBtn.innerHTML = pauseSvg(compact ? 16 : 20); });
  audio.addEventListener('pause', () => { playing = false; playBtn.classList.remove('playing'); playBtn.innerHTML = playSvg(compact ? 16 : 20); });

  playBtn.onclick = () => {
    if (playing) { audio.pause(); }
    else { stopAudio(); currentAudio = audio; if (speed) audio.playbackRate = speed; audio.play().catch(() => {}); }
  };

  bar.onclick = (e) => {
    const dur = effectiveDuration();
    if (!dur) return;
    audio.currentTime = ((e.clientX - bar.getBoundingClientRect().left) / bar.offsetWidth) * dur;
  };

  div._audio = audio;
  return div;
}

function playSvg(s) { return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="#fff" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>`; }
function pauseSvg(s) { return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${'#000'}" stroke="none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>`; }

// ═══════ RENDER ═══════
function render() {
  const app = $('#app');

  // Stop audio on screen change (но сохраняем постоянный плеер раунда)
  stopAudio({ preservePersistent: true });
  // Если ушли из игровой фазы или покинули sequential-режим — убить постоянный плеер
  if (persistentPlayer && (state.phase !== 'game' || !settings.guessSongName)) {
    cleanupPersistentPlayer();
  }
  // Перед очисткой DOM — отсоединить постоянный плеер, чтобы не потерять его
  if (persistentPlayer && persistentPlayer.parentNode) {
    persistentPlayer.parentNode.removeChild(persistentPlayer);
  }

  app.innerHTML = '';

  if (state.phase === 'game') { renderGame(app); return; }
  if (state.phase === 'results') {
    try { renderResults(app); }
    catch (e) {
      app.innerHTML = `<div class="panel" style="color:#ef4444"><b>Ошибка отображения результатов:</b><br><br>${(e && e.message) || e}<br><br><pre style="white-space:pre-wrap;font-size:11px;color:var(--c-muted)">${(e && e.stack) || ''}</pre></div><button class="btn btn-primary" id="resetBtn" style="margin-top:12px">Начать заново</button>`;
      $('#resetBtn').onclick = () => {
        cleanupPersistentPlayer();
        state = { phase: 'setup', tab: 'game', players: {}, currentName: '', slots: [], shuffled: [], idx: 0, guesses: {}, roundPhase: 'voting', currentVoterIdx: 0 };
        initSlots();
        render();
      };
    }
    return;
  }

  // Setup phase — show tabs
  renderNav(app);
  if (state.tab === 'history') renderHistory(app);
  else if (state.tab === 'settings') renderSettings(app);
  else renderSetup(app);
}

// ═══════ NAV ═══════
function renderNav(app) {
  const nav = document.createElement('div');
  nav.className = 'bottom-nav';
  const tabs = [
    { id: 'game', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>', label: 'Игра' },
    { id: 'history', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>', label: 'История' },
    { id: 'settings', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>', label: 'Настройки' },
  ];
  const hist = loadHistory();
  tabs.forEach(t => {
    const btn = document.createElement('button');
    btn.className = `nav-btn${state.tab === t.id ? ' active' : ''}`;
    btn.innerHTML = t.icon + ' ' + t.label + (t.id === 'history' && hist.length ? ` (${hist.length})` : '');
    btn.onclick = () => { state.tab = t.id; render(); };
    nav.appendChild(btn);
  });
  app.appendChild(nav);
}

// ═══════ SETUP ═══════
function renderSetup(app) {
  const names = getNames();
  const total = getTotal();
  const div = document.createElement('div');
  div.className = 'fade-in';

  div.innerHTML = `
    <div style="text-align:center;margin-bottom:36px">
      <div style="display:inline-flex;width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#f59e0b,#ea580c);align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 8px 24px rgba(245,158,11,0.3)">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <h1 style="font-size:28px;font-weight:900;color:var(--c-text-h);margin:8px 0 4px">Угадай песню</h1>
      <p style="color:var(--c-muted);font-size:13px">Игра для компании от 3 человек</p>
    </div>

    <div style="margin-bottom:20px">
      <label class="lbl">Имя участника</label>
      <input type="text" id="nameInput" placeholder="Как вас зовут?" value="${state.currentName}">
    </div>

    <div id="slotsArea" class="${state.currentName.trim() ? '' : 'hidden'}" style="margin-bottom:20px">
      <label class="lbl">Песни для «<span id="nameLabel">${state.currentName.trim()}</span>» (${settings.songsPerPlayer} шт.)</label>
      <div id="slotsContainer"></div>
      <button class="btn btn-orange" id="addPlayerBtn" disabled>Добавить песни</button>
      <p id="addPlayerHint" style="text-align:center;color:var(--c-muted3);font-size:12px;margin-top:8px;display:none"></p>
    </div>

    <div id="playersPanel" class="${names.length ? '' : 'hidden'}">
      <div class="panel">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px">
          <span class="lbl">Участники</span>
          <span style="color:var(--c-muted);font-size:12px">Песен: ${total}</span>
        </div>
        <div id="playersList"></div>
      </div>
    </div>

    <button class="btn btn-primary" id="startBtn" ${names.length < 3 ? 'disabled' : ''}>
      Начать игру
    </button>
    ${names.length > 0 && names.length < 3 ? '<p style="text-align:center;color:var(--c-muted3);font-size:12px;margin-top:8px">Нужно минимум 3 участника</p>' : ''}
  `;
  app.appendChild(div);

  // Name input
  const nameInput = $('#nameInput');
  nameInput.addEventListener('input', () => {
    state.currentName = nameInput.value;
    const area = $('#slotsArea');
    const label = $('#nameLabel');
    if (state.currentName.trim()) { area.classList.remove('hidden'); label.textContent = state.currentName.trim(); }
    else area.classList.add('hidden');
    updateAddBtn();
  });

  renderSlots();

  const pl = $('#playersList');
  names.forEach(n => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;background:var(--c-surface3);border-radius:10px;padding:10px 14px;margin-bottom:6px';
    row.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px">
        <div class="ava">${n[0].toUpperCase()}</div>
        <span style="font-weight:700;color:var(--c-text2);font-size:14px">${n}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="color:#f59e0b;font-size:13px;font-weight:700">${state.players[n].length} 🎵</span>
        <button style="background:none;border:none;cursor:pointer;padding:4px;line-height:0" data-del="${n}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b6490" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    row.querySelector('[data-del]').onclick = () => { delete state.players[n]; render(); };
    pl.appendChild(row);
  });

  $('#addPlayerBtn').onclick = () => {
    const n = state.currentName.trim();
    if (!n || state.players[n] || !state.slots[0]) return;
    state.players[n] = state.slots.filter(Boolean);
    state.currentName = ''; initSlots();
    render();
  };

  $('#startBtn').onclick = async () => {
    if (names.length < 3) return;
    const all = [];
    for (const [author, songs] of Object.entries(state.players))
      for (const s of songs) all.push({ ...s, author });
    for (let i = all.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [all[i], all[j]] = [all[j], all[i]]; }

    if (settings.guessSongName) {
      const btn = $('#startBtn');
      btn.disabled = true;
      btn.textContent = 'Готовим варианты...';
      try { await Promise.all(all.map(s => enrichSongOptions(s))); } catch {}
    }

    state.shuffled = all; state.idx = 0; state.guesses = {}; state.phase = 'game';
    state.roundPhase = 'passing'; state.currentVoterIdx = 0;
    render();
  };
}

function updateAddBtn() {
  const btn = $('#addPlayerBtn');
  if (!btn) return;
  const n = state.currentName.trim();
  const hasName = !!n;
  const hasSong = !!state.slots[0];
  const dup = hasName && !!state.players[n];
  btn.disabled = !(hasName && hasSong && !dup);
  const hint = $('#addPlayerHint');
  if (hint) {
    let msg = '';
    if (dup) msg = `Участник «${n}» уже добавлен. Введите другое имя.`;
    else if (hasName && !hasSong) msg = 'Сначала выберите хотя бы одну песню.';
    if (msg) { hint.textContent = msg; hint.style.display = 'block'; hint.style.color = dup ? '#ef4444' : 'var(--c-muted3)'; }
    else { hint.style.display = 'none'; }
  }
}

function renderSlots() {
  const container = $('#slotsContainer');
  if (!container) return;
  container.innerHTML = '';
  state.slots.forEach((song, i) => {
    const slot = document.createElement('div');
    slot.className = 'card';

    if (song) {
      slot.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" style="flex-shrink:0"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            <span style="color:var(--c-text);font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${song.artist} — ${song.title}</span>
          </div>
          <button style="background:var(--c-el);border:none;border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0" data-remove="${i}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>`;
      const player = createPlayer(song.preview, { compact: true, title: song.title, artist: song.artist });
      slot.appendChild(player);
      slot.querySelector('[data-remove]').onclick = () => { stopAudio(); state.slots[i] = null; renderSlots(); updateAddBtn(); };
    } else {
      const label = document.createElement('span');
      label.style.cssText = 'color:var(--c-muted4);font-size:12px;font-weight:700;display:block;margin-bottom:10px';
      label.textContent = `Песня ${i+1} ${i === 0 ? '(обязательна)' : '(необязат.)'}`;
      slot.appendChild(label);

      const searchRow = document.createElement('div');
      searchRow.style.cssText = 'display:flex;gap:8px';
      const input = document.createElement('input');
      input.type = 'text'; input.placeholder = 'Название или исполнитель...';
      input.style.cssText = 'flex:1';
      const btn = document.createElement('button');
      btn.style.cssText = 'background:#f59e0b;color:#000;border:none;border-radius:10px;padding:11px 16px;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:6px';
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Найти`;

      const resultsDiv = document.createElement('div');
      resultsDiv.style.marginTop = '10px';

      const doSearch = async () => {
        if (!input.value.trim()) return;
        btn.innerHTML = '...'; btn.disabled = true;
        resultsDiv.innerHTML = '<p class="loading">Ищем на Deezer...</p>';
        const data = await deezerSearch(input.value.trim());
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Найти`;
        btn.disabled = false;
        resultsDiv.innerHTML = '';

        if (!data || !data.length) {
          resultsDiv.innerHTML = '<p style="color:#ef4444;font-size:12px">Не найдено. Попробуйте другой запрос.</p>';
          return;
        }
        data.forEach(t => {
          const row = document.createElement('div');
          row.className = 'sr';
          row.innerHTML = `
            <img src="${t.cover}" alt="" onerror="this.style.display='none'">
            <div style="min-width:0;flex:1">
              <div class="sr-title">${t.title}</div>
              <div class="sr-sub">${t.artist}${t.album ? ' · ' + t.album : ''}</div>
            </div>`;
          row.onclick = () => {
            state.slots[i] = t;
            renderSlots();
            updateAddBtn();
          };
          resultsDiv.appendChild(row);
        });
      };

      input.onkeydown = (e) => { if (e.key === 'Enter') doSearch(); };
      btn.onclick = doSearch;
      searchRow.append(input, btn);
      slot.append(searchRow, resultsDiv);
    }
    container.appendChild(slot);
  });
}

// ═══════ GAME ═══════

function renderGame(app) {
  const names = getNames();
  const cur = state.shuffled[state.idx];
  if (settings.guessSongName) { renderGameSequential(app, names, cur); return; }
  const allVoted = names.every(n => state.guesses[`${state.idx}-${n}`]);

  // Find current voter (first who hasn't voted yet)
  app.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#f59e0b,#ea580c);display:flex;align-items:center;justify-content:center">

        <span style="font-size:18px;font-weight:900;color:var(--c-text-h)">Раунд ${state.idx + 1}</span>
      </div>
      <div style="background:var(--c-surface);border-radius:20px;padding:6px 16px;font-weight:800;font-size:14px;color:var(--c-muted2)">${state.idx + 1} / ${state.shuffled.length}</div>
    </div>

    <div class="top-progress"><div class="top-progress-fill" style="width:${((state.idx+1)/state.shuffled.length)*100}%"></div></div>

    <div id="playerArea" style="margin-bottom:24px"></div>

    <p style="text-align:center;color:var(--c-muted);font-size:12px;margin:-16px 0 20px">Послушайте и угадайте — чья это песня?</p>

    <div id="votingArea"></div>

    <button class="btn btn-primary" id="nextBtn" ${allVoted ? '' : 'disabled'} style="margin-top:24px">
      ${state.idx < state.shuffled.length - 1 ? 'Дальше' : 'Результаты'}
    </button>
    ${!allVoted ? '<p style="text-align:center;color:var(--c-muted3);font-size:12px;margin-top:8px">Ждём выбор от всех</p>' : ''}
  `;

  const playerArea = $('#playerArea');
  const player = createPlayer(cur.preview, { title: 'Чья это песня?', maxDuration: settings.previewDuration < 30 ? settings.previewDuration : 0, speed: settings.playbackSpeed !== 1 ? settings.playbackSpeed : 0 });
  playerArea.appendChild(player);

  const votingArea = $('#votingArea');
  names.forEach(voter => {
    const g = state.guesses[`${state.idx}-${voter}`];
    const panel = document.createElement('div');
    panel.style.cssText = 'background:var(--c-surface2);border:1px solid var(--c-border2);border-radius:14px;padding:16px;margin-bottom:10px';

    const header = document.createElement('div');
    header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:10px';
    header.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px">
        <div class="ava ava-sm">${voter[0].toUpperCase()}</div>
        <span style="font-weight:800;font-size:14px;color:var(--c-text2)">${voter}</span>
      </div>
      ${g ? '<span style="color:#10b981;font-size:12px;font-weight:700;background:rgba(16,185,129,0.12);padding:4px 12px;border-radius:8px">Голос принят ✓</span>' : ''}`;

    panel.appendChild(header);

    if (!g) {
      const btns = document.createElement('div');
      btns.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px';
      names.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'guess-btn active';
        b.textContent = opt;
        b.onclick = () => {
          state.guesses[`${state.idx}-${voter}`] = { guessed: opt, correct: cur.author, isCorrect: opt === cur.author };
          // Replace buttons with "Голос принят" without full re-render
          btns.remove();
          const badge = document.createElement('span');
          badge.style.cssText = 'color:#10b981;font-size:12px;font-weight:700;background:rgba(16,185,129,0.12);padding:4px 12px;border-radius:8px';
          badge.textContent = 'Голос принят ✓';
          header.appendChild(badge);
          // Enable next button if all voted
          if (names.every(n => state.guesses[`${state.idx}-${n}`])) {
            const nextBtn = $('#nextBtn');
            nextBtn.disabled = false;
            const hint = nextBtn.nextElementSibling;
            if (hint) hint.remove();
          }
        };
        btns.appendChild(b);
      });
      panel.appendChild(btns);
    }

    votingArea.appendChild(panel);
  });

  $('#nextBtn').onclick = () => {
    if (!names.every(n => state.guesses[`${state.idx}-${n}`])) return;
    stopAudio();
    if (state.idx < state.shuffled.length - 1) state.idx++;
    else state.phase = 'results';
    render();
  };
}

// ═══════ GAME — последовательный режим (с угадыванием песни) ═══════
function renderGameSequential(app, names, cur) {
  const total = state.shuffled.length;
  const allVoted = names.every(n => state.guesses[`${state.idx}-${n}`]);

  app.innerHTML = renderGameHeader(state.idx, total) + '<div id="persistentPlayerHolder" style="margin-bottom:18px"></div><div id="roundBody"></div>';

  // Постоянный плеер на весь раунд — не останавливается между фазами passing/voting/confirmed
  if (persistentPlayerRoundIdx !== state.idx) {
    cleanupPersistentPlayer();
    persistentPlayer = createPlayer(cur.preview, {
      title: 'Послушай и угадай',
      maxDuration: settings.previewDuration < 30 ? settings.previewDuration : 0,
      speed: settings.playbackSpeed !== 1 ? settings.playbackSpeed : 0,
    });
    persistentPlayerRoundIdx = state.idx;
  }
  $('#persistentPlayerHolder').appendChild(persistentPlayer);

  const body = $('#roundBody');

  // ─── Фаза подтверждения ответа (показываем до проверки allVoted, чтобы последний голосующий тоже её видел) ───
  if (state.roundPhase === 'confirmed') {
    if (state.currentVoterIdx >= names.length) state.currentVoterIdx = names.length - 1;
    const voter = names[state.currentVoterIdx];
    // Найти следующего непроголосовавшего
    let nextIdx = -1;
    for (let i = 0; i < names.length; i++) {
      if (!state.guesses[`${state.idx}-${names[i]}`]) { nextIdx = i; break; }
    }
    const hasMore = nextIdx !== -1;
    const nextVoter = hasMore ? names[nextIdx] : null;
    const isLastRound = state.idx >= total - 1;

    body.innerHTML = `
      <div class="panel" style="text-align:center;padding:28px 20px">
        <div style="font-size:44px;margin-bottom:10px">✓</div>
        <div style="font-size:20px;font-weight:900;color:var(--c-text-h);margin-bottom:4px">Ответ <span style="color:#f59e0b">${voter}</span> принят</div>
        <div style="color:var(--c-muted);font-size:13px">Голосующий ${state.currentVoterIdx + 1} из ${names.length}</div>
      </div>
      <button class="btn btn-primary" id="nextVoterBtn">${hasMore ? `Передать <span style="color:#ffd666">${nextVoter}</span>` : (isLastRound ? 'Результаты' : 'Следующий раунд')}</button>
      <button class="btn" id="undoBtn" style="background:var(--c-surface);color:var(--c-text2);border:1px solid var(--c-border);margin-top:10px">Изменить ответ</button>
    `;
    $('#nextVoterBtn').onclick = () => {
      if (hasMore) {
        state.currentVoterIdx = nextIdx;
        state.roundPhase = 'passing';
        render();
      } else {
        cleanupPersistentPlayer();
        stopAudio();
        if (!isLastRound) {
          state.idx++;
          state.roundPhase = 'passing';
          state.currentVoterIdx = 0;
        } else {
          state.phase = 'results';
        }
        render();
      }
    };
    $('#undoBtn').onclick = () => {
      delete state.guesses[`${state.idx}-${voter}`];
      state.roundPhase = 'voting';
      render();
    };
    return;
  }

  // Все проголосовали (страховка — обычно сюда не попадаем из-за confirmed)
  if (allVoted) {
    body.innerHTML = `
      <div class="panel" style="text-align:center">
        <div style="font-size:40px;margin-bottom:6px">✅</div>
        <div style="font-weight:900;font-size:16px;color:var(--c-text-h)">Раунд завершён</div>
      </div>
      <button class="btn btn-primary" id="nextRoundBtn">${state.idx < total - 1 ? 'Следующий раунд' : 'Результаты'}</button>
    `;
    $('#nextRoundBtn').onclick = () => {
      cleanupPersistentPlayer();
      stopAudio();
      if (state.idx < total - 1) {
        state.idx++;
        state.roundPhase = 'passing';
        state.currentVoterIdx = 0;
      } else {
        state.phase = 'results';
      }
      render();
    };
    return;
  }

  // Защита от выхода индекса голосующего за пределы
  if (state.currentVoterIdx >= names.length) state.currentVoterIdx = 0;
  // Если текущий голосующий уже проголосовал — сдвигаемся на первого непроголосовавшего
  if (state.guesses[`${state.idx}-${names[state.currentVoterIdx]}`]) {
    for (let i = 0; i < names.length; i++) {
      if (!state.guesses[`${state.idx}-${names[i]}`]) { state.currentVoterIdx = i; break; }
    }
  }

  const voter = names[state.currentVoterIdx];
  const voterNum = state.currentVoterIdx + 1;
  const voterTotal = names.length;

  // «passing» фаза теперь сразу переходит в голосование
  if (state.roundPhase === 'passing') state.roundPhase = 'voting';

  // ─── Фаза голосования ───
  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div class="ava">${voter[0].toUpperCase()}</div>
      <div style="min-width:0;flex:1">
        <div style="font-size:11px;color:var(--c-muted);font-weight:800;letter-spacing:1px;text-transform:uppercase">Ходит</div>
        <div style="font-size:18px;font-weight:900;color:var(--c-text-h);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${voter}</div>
      </div>
      <div style="color:var(--c-muted);font-size:12px;font-weight:700;flex-shrink:0">${voterNum}/${voterTotal}</div>
    </div>

    <label class="lbl">Чья это песня?</label>
    <div id="authorBtns" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px"></div>

    <div id="songSection">
      <label class="lbl">Что это за песня?</label>
      <div id="songBtns" style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px"></div>
    </div>

    <button class="btn btn-primary" id="confirmBtn" disabled style="margin-top:18px">Подтвердить ответ</button>
  `;

  let selAuthor = null;
  let selSongIdx = null;

  const confirmBtn = $('#confirmBtn');
  const opts = cur.options || [];
  const songSection = $('#songSection');

  // Если вариантов нет (Deezer не ответил) — скрыть секцию и требовать только автора
  if (!opts.length) {
    songSection.style.display = 'none';
    selSongIdx = -1; // отметка «не применимо»
  }

  const updateConfirm = () => {
    confirmBtn.disabled = !(selAuthor && selSongIdx !== null);
  };

  const authorBox = $('#authorBtns');
  names.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'guess-btn active';
    b.textContent = opt;
    b.onclick = () => {
      selAuthor = opt;
      [...authorBox.children].forEach(x => { x.classList.remove('selected'); x.classList.add('active'); });
      b.classList.remove('active');
      b.classList.add('selected');
      updateConfirm();
    };
    authorBox.appendChild(b);
  });

  const songBox = $('#songBtns');
  opts.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'guess-btn active';
    b.style.cssText = 'text-align:left;padding:12px 14px;width:100%;display:block';
    b.innerHTML = `<div style="font-weight:800;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${opt.artist}</div><div style="font-size:12px;opacity:0.75;margin-top:2px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${opt.title}</div>`;
    b.onclick = () => {
      selSongIdx = i;
      [...songBox.children].forEach(x => { x.classList.remove('selected'); x.classList.add('active'); });
      b.classList.remove('active');
      b.classList.add('selected');
      updateConfirm();
    };
    songBox.appendChild(b);
  });

  confirmBtn.onclick = () => {
    const chosenSong = selSongIdx >= 0 ? opts[selSongIdx] : null;
    const correctSong = cur.correctOption || { title: cur.title, artist: cur.artist };
    const songCorrect = !!(chosenSong && chosenSong.title === correctSong.title && chosenSong.artist === correctSong.artist);
    state.guesses[`${state.idx}-${voter}`] = {
      guessed: selAuthor,
      correct: cur.author,
      isCorrect: selAuthor === cur.author,
      guessedSong: chosenSong,
      correctSong: correctSong,
      songCorrect: songCorrect,
      songModeOn: opts.length > 0,
    };
    state.roundPhase = 'confirmed';
    render();
  };
}

// ═══════ RESULTS ═══════
function renderResults(app) {
  const names = getNames();
  const sc = {}; names.forEach(n => sc[n] = 0);
  const songModeUsed = Object.values(state.guesses).some(g => g && g.songModeOn);
  for (const [k, v] of Object.entries(state.guesses)) {
    const voter = k.substring(k.indexOf('-') + 1);
    if (!(voter in sc)) continue;
    if (v.isCorrect) sc[voter]++;
    if (v.songCorrect) sc[voter]++;
  }
  const sorted = Object.entries(sc).sort((a, b) => b[1] - a[1]);
  const top = sorted[0]?.[1] || 0;
  const maxScore = state.shuffled.length * (songModeUsed ? 2 : 1);

  // Save to history
  const gameRecord = {
    date: new Date().toISOString(),
    players: names,
    scores: sc,
    winner: sorted[0]?.[0] || '',
    winnerScore: top,
    totalSongs: state.shuffled.length,
    songs: state.shuffled.map(s => ({ title: s.title, artist: s.artist, author: s.author })),
  };
  addGameToHistory(gameRecord);

  let html = `
    <div style="text-align:center;margin-bottom:32px" class="fade-in">
      <div style="font-size:52px;margin-bottom:8px">🏆</div>
      <h1 style="font-size:26px;font-weight:900;color:var(--c-text-h);margin:0 0 4px">Результаты</h1>
      <p style="color:var(--c-muted);font-size:13px">Кто лучше знает музыкальные вкусы?</p>
    </div>

    <div class="panel">
      ${sorted.map(([n, s], i) => {
        const w = s === top && top > 0;
        return `<div style="display:flex;justify-content:space-between;align-items:center;background:${w ? 'rgba(245,158,11,0.1)' : 'var(--c-surface3)'};border:${w ? '1px solid rgba(245,158,11,0.25)' : '1px solid transparent'};border-radius:12px;padding:12px 18px;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-weight:900;font-size:16px;width:28px;color:${w ? '#f59e0b' : 'var(--c-muted3)'}">${w ? '👑' : '#'+(i+1)}</span>
            <span style="font-weight:800;color:${w ? 'var(--c-text-h)' : 'var(--c-muted2)'}">${n}</span>
          </div>
          <div><span style="font-size:24px;font-weight:900;color:${w ? '#f59e0b' : 'var(--c-muted3)'}">${s}</span><span style="font-size:13px;color:var(--c-muted3);font-weight:700">/${maxScore}</span></div>
        </div>`;
      }).join('')}
    </div>

    <label class="lbl" style="margin-bottom:14px">Все песни</label>
    <div id="songsDetail"></div>

    <button class="btn btn-primary" id="resetBtn" style="margin-top:8px">Начать заново</button>
  `;
  app.innerHTML = html;

  const detail = $('#songsDetail');
  state.shuffled.forEach((song, si) => {
    const div = document.createElement('div');
    div.style.cssText = 'background:var(--c-surface2);border:1px solid var(--c-border2);border-radius:16px;padding:18px;margin-bottom:12px';

    let inner = `
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span style="font-weight:800;font-size:14px;color:var(--c-text2)">${song.artist ? `${song.artist} — ${song.title}` : song.title}</span>
      </div>
      <p style="color:#f59e0b;font-size:12px;margin:0 0 12px 19px;opacity:0.7">Добавил(а): <b>${song.author}</b></p>
      <div id="songPlayer${si}" style="margin-bottom:12px"></div>`;

    names.forEach(n => {
      const g = state.guesses[`${si}-${n}`];
      if (!g) return;
      const hasSong = g.songModeOn;
      const bothOk = g.isCorrect && (hasSong ? g.songCorrect : true);
      const bothBad = !g.isCorrect && (hasSong ? !g.songCorrect : true);
      const cls = bothOk ? 'result-correct' : (bothBad ? 'result-wrong' : 'result-wrong');
      const authorMark = g.isCorrect
        ? `<span style="color:#10b981;font-weight:800">автор ✓</span>`
        : `<span style="color:#ef4444;font-weight:800">автор ✗</span>`;
      const songMark = hasSong
        ? (g.songCorrect
            ? `<span style="color:#10b981;font-weight:800">песня ✓</span>`
            : `<span style="color:#ef4444;font-weight:800">песня ✗</span>`)
        : '';
      inner += `<div class="${cls}" style="flex-direction:column;align-items:stretch;gap:4px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:700;color:var(--c-dim)">${n}</span>
          <span style="display:flex;gap:10px;font-size:12px">${authorMark}${songMark}</span>
        </div>
        <div style="font-size:11px;color:var(--c-muted);font-weight:600">Выбрал: ${g.guessed}${hasSong && g.guessedSong ? ` · ${g.guessedSong.artist} — ${g.guessedSong.title}` : ''}</div>
      </div>`;
    });

    div.innerHTML = inner;
    detail.appendChild(div);

    const playerContainer = div.querySelector(`#songPlayer${si}`);
    const player = createPlayer(song.preview, { compact: true, title: song.title, artist: song.artist });
    playerContainer.appendChild(player);
  });

  $('#resetBtn').onclick = () => {
    state = { phase: 'setup', tab: 'game', players: {}, currentName: '', slots: [], shuffled: [], idx: 0, guesses: {}, roundPhase: 'passing', currentVoterIdx: 0 };
    initSlots();
    render();
  };
}

// ═══════ HISTORY ═══════
function renderHistory(app) {
  const history = loadHistory();
  const div = document.createElement('div');
  div.className = 'fade-in';

  if (!history.length) {
    div.innerHTML = `
      <div class="history-empty">
        <div style="font-size:48px;margin-bottom:16px;opacity:0.5">📋</div>
        <p style="font-weight:800;font-size:16px;color:var(--c-muted)">Пока нет сыгранных игр</p>
        <p style="color:var(--c-muted3);font-size:13px;margin-top:6px">Сыграйте первую партию, и она появится здесь</p>
      </div>`;
    app.appendChild(div);
    return;
  }

  div.innerHTML = `<label class="lbl" style="margin-bottom:14px">Последние игры (${history.length})</label>`;

  // Stats
  const totalGames = history.length;
  const allWinners = {};
  history.forEach(g => { if (g.winner) allWinners[g.winner] = (allWinners[g.winner] || 0) + 1; });
  const topPlayer = Object.entries(allWinners).sort((a,b) => b[1] - a[1])[0];

  if (totalGames >= 2 && topPlayer) {
    const statsDiv = document.createElement('div');
    statsDiv.className = 'panel';
    statsDiv.innerHTML = `
      <label class="lbl">Статистика</label>
      <div style="display:flex;gap:12px;margin-top:8px">
        <div style="flex:1;background:var(--c-surface3);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:24px;font-weight:900;color:#f59e0b">${totalGames}</div>
          <div style="font-size:11px;color:var(--c-muted);margin-top:2px">Игр сыграно</div>
        </div>
        <div style="flex:1;background:var(--c-surface3);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:16px;font-weight:900;color:#f59e0b">👑 ${topPlayer[0]}</div>
          <div style="font-size:11px;color:var(--c-muted);margin-top:2px">Побед: ${topPlayer[1]}</div>
        </div>
      </div>`;
    div.appendChild(statsDiv);
  }

  history.forEach((game, gi) => {
    const card = document.createElement('div');
    card.className = 'history-card';
    const d = new Date(game.date);
    const dateStr = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    const scores = Object.entries(game.scores || {}).sort((a,b) => b[1] - a[1]).map(([n,s]) => `${n}: ${s}`).join(', ');

    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="history-date">${dateStr}</div>
          <div class="history-winner">👑 ${game.winner} — ${game.winnerScore}/${game.totalSongs}</div>
          <div class="history-players">${game.players.join(', ')}</div>
        </div>
        <button style="background:var(--c-el);border:none;border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0" data-del-hist="${gi}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b6490" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      ${scores ? `<div class="history-detail">${scores}</div>` : ''}
    `;
    card.querySelector('[data-del-hist]').onclick = (e) => {
      e.stopPropagation();
      const h = loadHistory();
      h.splice(gi, 1);
      saveHistory(h);
      render();
    };
    div.appendChild(card);
  });

  // Clear all button
  if (history.length > 1) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'btn';
    clearBtn.style.cssText = 'background:var(--c-surface);color:#ef4444;border:1px solid var(--c-border);margin-top:12px;font-size:13px';
    clearBtn.textContent = 'Очистить историю';
    clearBtn.onclick = () => { saveHistory([]); render(); };
    div.appendChild(clearBtn);
  }

  app.appendChild(div);
}

      <div class="setting-desc">Сколько секунд играет песня</div>
    </div>
    <div style="display:flex;gap:6px">
      ${durations.map(d => `<button class="dur-btn${settings.previewDuration === d ? ' dur-active' : ''}" data-dur="${d}">${d}с</button>`).join('')}
    </div>
  `;
  div.appendChild(durRow);

  // Playback speed
  const speedRow = document.createElement('div');
  speedRow.className = 'setting-row';
  speedRow.style.cssText = 'flex-direction:column;align-items:stretch';
  const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
  const speedLabels = { 0.5: '0.5×', 0.75: '0.75×', 1: '1×', 1.25: '1.25×', 1.5: '1.5×', 2: '2×' };
  speedRow.innerHTML = `
    <div style="margin-bottom:12px">
      <div class="setting-label">Скорость воспроизведения</div>
      <div class="setting-desc">Замедлить или ускорить песню</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${speeds.map(s => `<button class="dur-btn${settings.playbackSpeed === s ? ' dur-active' : ''}" data-speed="${s}">${speedLabels[s]}</button>`).join('')}
    </div>
  `;
  div.appendChild(speedRow);

  // Theme toggle
  const themeRow = document.createElement('div');
  themeRow.className = 'setting-row';
  themeRow.innerHTML = `
    <div>
      <div class="setting-label">Светлая тема</div>
      <div class="setting-desc">Переключить оформление</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="themeToggle" ${settings.theme === 'light' ? 'checked' : ''}>
      <span class="toggle-track"></span>
    </label>
  `;
  div.appendChild(themeRow);

  // App version
  const ver = document.createElement('div');
  ver.style.cssText = 'text-align:center;margin-top:40px;color:var(--c-muted3);font-size:12px';
  ver.innerHTML = `Угадай песню v1.3<br>Музыкальная игра для компании друзей`;
  div.appendChild(ver);

  app.appendChild(div);

  $('#sppMinus').onclick = () => {
    if (settings.songsPerPlayer > 1) {
      settings.songsPerPlayer--;
      saveSettings(settings);
      $('#sppValue').textContent = settings.songsPerPlayer;
      initSlots();
    }
  };
  $('#sppPlus').onclick = () => {
    if (settings.songsPerPlayer < 5) {
      settings.songsPerPlayer++;
      saveSettings(settings);
      $('#sppValue').textContent = settings.songsPerPlayer;
      initSlots();
    }
  };

  $('#themeToggle').onchange = (e) => {
    settings.theme = e.target.checked ? 'light' : 'dark';
    saveSettings(settings);
    applyTheme(settings.theme);
  };

  $('#guessSongToggle').onchange = (e) => {
    settings.guessSongName = e.target.checked;
    saveSettings(settings);
  };

  $$('[data-dur]').forEach(btn => {
    btn.onclick = () => {
      settings.previewDuration = parseInt(btn.dataset.dur);
      saveSettings(settings);
      $$('[data-dur]').forEach(b => b.classList.remove('dur-active'));
      btn.classList.add('dur-active');
    };
  });

  $$('[data-speed]').forEach(btn => {
    btn.onclick = () => {
      settings.playbackSpeed = parseFloat(btn.dataset.speed);
      saveSettings(settings);
      $$('[data-speed]').forEach(b => b.classList.remove('dur-active'));
      btn.classList.add('dur-active');
    };
  });
}

// Start
render();
</script>
</body>
</html>
